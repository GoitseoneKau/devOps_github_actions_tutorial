name: Deploy Staging Preview
on:
  pull_request:
    branches: [ main ]

jobs:
  deploy_preview:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true  # temporary override

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Firebase Dev Environment
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_CLI_TOKEN }}'
          projectId: my-devops-portfolio-dev
          channelId: pr-${{ github.event.number }}